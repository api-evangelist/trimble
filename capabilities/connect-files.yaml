naftiko: 1.0.0-alpha2
info:
  label: Trimble Connect API — Files
  description: 'Trimble Connect API — Files. 3 operations. Lead operation: List project files. Self-contained Naftiko capability
    covering one Trimble business surface.'
  tags:
  - Trimble
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRIMBLE_API_KEY: TRIMBLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-files
    baseUri: https://app.connect.trimble.com/tc/api/2.0
    description: Trimble Connect API — Files business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-files
      path: /projects/{projectId}/files
      operations:
      - name: listprojectfiles
        method: GET
        description: List project files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: query
          type: string
          description: Parent folder path
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
      - name: uploadfile
        method: POST
        description: Upload a file to a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-files-fileId
      path: /projects/{projectId}/files/{fileId}
      operations:
      - name: getfile
        method: GET
        description: Get file metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fileId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TRIMBLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-files-rest
    port: 8080
    description: REST adapter for Trimble Connect API — Files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/projects/{projectid}/files
      name: projects-projectid-files
      description: REST surface for projects-projectId-files.
      operations:
      - method: GET
        name: listprojectfiles
        description: List project files
        call: connect-files.listprojectfiles
        with:
          path: rest.path
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadfile
        description: Upload a file to a project
        call: connect-files.uploadfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/files/{fileid}
      name: projects-projectid-files-fileid
      description: REST surface for projects-projectId-files-fileId.
      operations:
      - method: GET
        name: getfile
        description: Get file metadata
        call: connect-files.getfile
        with:
          fileId: rest.fileId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trimble Connect API — Files. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-project-files
      description: List project files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-files.listprojectfiles
      with:
        path: tools.path
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file-project
      description: Upload a file to a project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-files.uploadfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-file-metadata
      description: Get file metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-files.getfile
      with:
        fileId: tools.fileId
      outputParameters:
      - type: object
        mapping: $.
