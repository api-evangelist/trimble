naftiko: 1.0.0-alpha2
info:
  label: Trimble Connect API — Users
  description: 'Trimble Connect API — Users. 1 operations. Lead operation: List project members. Self-contained Naftiko capability
    covering one Trimble business surface.'
  tags:
  - Trimble
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRIMBLE_API_KEY: TRIMBLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-users
    baseUri: https://app.connect.trimble.com/tc/api/2.0
    description: Trimble Connect API — Users business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-members
      path: /projects/{projectId}/members
      operations:
      - name: listprojectmembers
        method: GET
        description: List project members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TRIMBLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-users-rest
    port: 8080
    description: REST adapter for Trimble Connect API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/projects/{projectid}/members
      name: projects-projectid-members
      description: REST surface for projects-projectId-members.
      operations:
      - method: GET
        name: listprojectmembers
        description: List project members
        call: connect-users.listprojectmembers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trimble Connect API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-project-members
      description: List project members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-users.listprojectmembers
      outputParameters:
      - type: object
        mapping: $.
