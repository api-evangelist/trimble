naftiko: 1.0.0-alpha2
info:
  label: Trimble Connect API — BCF Topics
  description: 'Trimble Connect API — BCF Topics. 4 operations. Lead operation: List BCF topics (issues). Self-contained Naftiko
    capability covering one Trimble business surface.'
  tags:
  - Trimble
  - BCF Topics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRIMBLE_API_KEY: TRIMBLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-bcf-topics
    baseUri: https://app.connect.trimble.com/tc/api/2.0
    description: Trimble Connect API — BCF Topics business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-topics
      path: /projects/{projectId}/topics
      operations:
      - name: listbcftopics
        method: GET
        description: List BCF topics (issues)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topicType
          in: query
          type: string
        - name: topicStatus
          in: query
          type: string
        - name: assignedTo
          in: query
          type: string
        - name: page
          in: query
          type: integer
      - name: createbcftopic
        method: POST
        description: Create a BCF topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-topics-topicGuid
      path: /projects/{projectId}/topics/{topicGuid}
      operations:
      - name: getbcftopic
        method: GET
        description: Get a BCF topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topicGuid
          in: path
          type: string
          required: true
      - name: updatebcftopic
        method: PUT
        description: Update a BCF topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topicGuid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.TRIMBLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-bcf-topics-rest
    port: 8080
    description: REST adapter for Trimble Connect API — BCF Topics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/topics
      name: projects-projectid-topics
      description: REST surface for projects-projectId-topics.
      operations:
      - method: GET
        name: listbcftopics
        description: List BCF topics (issues)
        call: connect-bcf-topics.listbcftopics
        with:
          topicType: rest.topicType
          topicStatus: rest.topicStatus
          assignedTo: rest.assignedTo
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbcftopic
        description: Create a BCF topic
        call: connect-bcf-topics.createbcftopic
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/topics/{topicguid}
      name: projects-projectid-topics-topicguid
      description: REST surface for projects-projectId-topics-topicGuid.
      operations:
      - method: GET
        name: getbcftopic
        description: Get a BCF topic
        call: connect-bcf-topics.getbcftopic
        with:
          topicGuid: rest.topicGuid
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatebcftopic
        description: Update a BCF topic
        call: connect-bcf-topics.updatebcftopic
        with:
          topicGuid: rest.topicGuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-bcf-topics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trimble Connect API — BCF Topics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-bcf-topics-issues
      description: List BCF topics (issues)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-bcf-topics.listbcftopics
      with:
        topicType: tools.topicType
        topicStatus: tools.topicStatus
        assignedTo: tools.assignedTo
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-bcf-topic
      description: Create a BCF topic
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-bcf-topics.createbcftopic
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bcf-topic
      description: Get a BCF topic
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-bcf-topics.getbcftopic
      with:
        topicGuid: tools.topicGuid
      outputParameters:
      - type: object
        mapping: $.
    - name: update-bcf-topic
      description: Update a BCF topic
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-bcf-topics.updatebcftopic
      with:
        topicGuid: tools.topicGuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
