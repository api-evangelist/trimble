naftiko: 1.0.0-alpha2
info:
  label: Trimble Connect API — Projects
  description: 'Trimble Connect API — Projects. 4 operations. Lead operation: List projects. Self-contained Naftiko capability
    covering one Trimble business surface.'
  tags:
  - Trimble
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRIMBLE_API_KEY: TRIMBLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-projects
    baseUri: https://app.connect.trimble.com/tc/api/2.0
    description: Trimble Connect API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: List projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeDeleted
          in: query
          type: boolean
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
      - name: createproject
        method: POST
        description: Create a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId
      path: /projects/{projectId}
      operations:
      - name: getproject
        method: GET
        description: Get project details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateproject
        method: PATCH
        description: Update a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.TRIMBLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-projects-rest
    port: 8080
    description: REST adapter for Trimble Connect API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: listprojects
        description: List projects
        call: connect-projects.listprojects
        with:
          includeDeleted: rest.includeDeleted
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Create a project
        call: connect-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}
      name: projects-projectid
      description: REST surface for projects-projectId.
      operations:
      - method: GET
        name: getproject
        description: Get project details
        call: connect-projects.getproject
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateproject
        description: Update a project
        call: connect-projects.updateproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trimble Connect API — Projects. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-projects
      description: List projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-projects.listprojects
      with:
        includeDeleted: tools.includeDeleted
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Create a project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connect-projects.createproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-project-details
      description: Get project details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-projects.getproject
      outputParameters:
      - type: object
        mapping: $.
    - name: update-project
      description: Update a project
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-projects.updateproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
