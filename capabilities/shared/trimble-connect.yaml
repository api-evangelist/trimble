name: Trimble Connect API
description: Shared capability definition for the Trimble Connect BIM collaboration API
version: "2.0"
baseUrl: https://app.connect.trimble.com/tc/api/2.0

authentication:
  type: bearer
  description: Trimble Identity OAuth 2.0 Bearer token. Obtain via Trimble Identity (OAuth 2.0 / OpenID Connect) using client credentials or authorization code flow.

consumes:
  - operationId: listProjects
    summary: List Projects
    description: Returns all Trimble Connect projects accessible to the authenticated user
    method: GET
    path: /projects
    parameters:
      - name: page
        in: query
        type: integer
      - name: pageSize
        in: query
        type: integer
      - name: includeDeleted
        in: query
        type: boolean

  - operationId: createProject
    summary: Create Project
    description: Creates a new Trimble Connect project
    method: POST
    path: /projects
    requestBody:
      name: string
      description: string
      type: string
      location: string

  - operationId: getProject
    summary: Get Project
    description: Returns detailed information for a specific project
    method: GET
    path: /projects/{projectId}
    parameters:
      - name: projectId
        in: path
        required: true
        type: string

  - operationId: updateProject
    summary: Update Project
    description: Updates mutable project properties
    method: PATCH
    path: /projects/{projectId}
    parameters:
      - name: projectId
        in: path
        required: true
        type: string

  - operationId: listProjectFiles
    summary: List Project Files
    description: Returns files and folders within a project directory
    method: GET
    path: /projects/{projectId}/files
    parameters:
      - name: projectId
        in: path
        required: true
        type: string
      - name: path
        in: query
        type: string
      - name: page
        in: query
        type: integer

  - operationId: uploadFile
    summary: Upload File
    description: Uploads a file to the specified project folder
    method: POST
    path: /projects/{projectId}/files
    parameters:
      - name: projectId
        in: path
        required: true
        type: string

  - operationId: getFile
    summary: Get File
    description: Returns metadata for a specific file
    method: GET
    path: /projects/{projectId}/files/{fileId}
    parameters:
      - name: projectId
        in: path
        required: true
        type: string
      - name: fileId
        in: path
        required: true
        type: string

  - operationId: listBCFTopics
    summary: List BCF Topics
    description: Returns BIM Collaboration Format issues for a project
    method: GET
    path: /projects/{projectId}/topics
    parameters:
      - name: projectId
        in: path
        required: true
        type: string
      - name: topicType
        in: query
        type: string
      - name: topicStatus
        in: query
        type: string

  - operationId: createBCFTopic
    summary: Create BCF Topic
    description: Creates a new BCF issue or clash record in a project
    method: POST
    path: /projects/{projectId}/topics
    parameters:
      - name: projectId
        in: path
        required: true
        type: string

  - operationId: getBCFTopic
    summary: Get BCF Topic
    description: Returns details for a specific BCF topic
    method: GET
    path: /projects/{projectId}/topics/{topicGuid}
    parameters:
      - name: projectId
        in: path
        required: true
        type: string
      - name: topicGuid
        in: path
        required: true
        type: string

  - operationId: updateBCFTopic
    summary: Update BCF Topic
    description: Updates the status, assignee, or other topic properties
    method: PATCH
    path: /projects/{projectId}/topics/{topicGuid}
    parameters:
      - name: projectId
        in: path
        required: true
        type: string
      - name: topicGuid
        in: path
        required: true
        type: string

  - operationId: listProjectMembers
    summary: List Project Members
    description: Returns all members of a project and their roles
    method: GET
    path: /projects/{projectId}/members
    parameters:
      - name: projectId
        in: path
        required: true
        type: string

  - operationId: addProjectMember
    summary: Add Project Member
    description: Invites a user to join a project with a specified role
    method: POST
    path: /projects/{projectId}/members
    parameters:
      - name: projectId
        in: path
        required: true
        type: string

server:
  rest:
    port: 8100
  mcp:
    port: 9100
