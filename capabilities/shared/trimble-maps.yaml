name: Trimble Maps API
description: Shared capability definition for the Trimble Maps / PC*MILER commercial vehicle routing and mapping API
version: "2.0"
baseUrl: https://pcmiler.alk.com/apis/rest/v1.0

authentication:
  type: apikey
  header: Authorization
  description: Trimble Maps API key. Obtain from the Trimble Maps Developer Portal (developer.trimblemaps.com).

consumes:
  - operationId: calculateRoute
    summary: Calculate Route
    description: Calculates an optimized commercial vehicle route between multiple stops with mileage, toll, and fuel cost
    method: GET
    path: /Service.svc/route
    parameters:
      - name: stops
        in: query
        required: true
        type: string
        description: Semicolon-delimited stops (City,ST or lat,lng)
      - name: vehicleType
        in: query
        type: string
      - name: routeType
        in: query
        type: string
      - name: vehicleHeight
        in: query
        type: string
      - name: vehicleWeight
        in: query
        type: string

  - operationId: geocodeAddress
    summary: Geocode Address
    description: Converts a street address or place name to geographic coordinates
    method: GET
    path: /Service.svc/geocode
    parameters:
      - name: addr
        in: query
        required: true
        type: string
      - name: dataVersion
        in: query
        type: string

  - operationId: reverseGeocode
    summary: Reverse Geocode
    description: Converts coordinates to a street address
    method: GET
    path: /Service.svc/reverseGeocode
    parameters:
      - name: coords
        in: query
        required: true
        type: string
        description: "Latitude,Longitude"

  - operationId: getRouteMileage
    summary: Get Route Mileage
    description: Returns mileage-only calculation for a route without full directions
    method: GET
    path: /Service.svc/mileage
    parameters:
      - name: stops
        in: query
        required: true
        type: string
      - name: vehicleType
        in: query
        type: string

  - operationId: getMapTile
    summary: Get Map Tile
    description: Returns a raster map tile for rendering in web or mobile map views
    method: GET
    path: /Service.svc/maptile
    parameters:
      - name: zoom
        in: query
        required: true
        type: integer
      - name: x
        in: query
        required: true
        type: integer
      - name: y
        in: query
        required: true
        type: integer
      - name: style
        in: query
        type: string

  - operationId: getTimezone
    summary: Get Timezone
    description: Returns the timezone for a geographic coordinate pair
    method: GET
    path: /Service.svc/timezone
    parameters:
      - name: coords
        in: query
        required: true
        type: string

server:
  rest:
    port: 8101
  mcp:
    port: 9101
