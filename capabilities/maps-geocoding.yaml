naftiko: 1.0.0-alpha2
info:
  label: Trimble Maps API — Geocoding
  description: 'Trimble Maps API — Geocoding. 2 operations. Lead operation: Geocode an address. Self-contained Naftiko capability
    covering one Trimble business surface.'
  tags:
  - Trimble
  - Geocoding
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRIMBLE_API_KEY: TRIMBLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: maps-geocoding
    baseUri: https://pcmiler.alk.com/apis/rest/v1.0
    description: Trimble Maps API — Geocoding business capability. Self-contained, no shared references.
    resources:
    - name: Service.svc-geocode
      path: /Service.svc/geocode
      operations:
      - name: geocodeaddress
        method: GET
        description: Geocode an address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: addr
          in: query
          type: string
          description: Address to geocode (street, city, state/province, zip, country)
          required: true
        - name: region
          in: query
          type: string
          description: Geographic region
        - name: outputFormat
          in: query
          type: string
    - name: Service.svc-reverseGeocode
      path: /Service.svc/reverseGeocode
      operations:
      - name: reversegeocode
        method: GET
        description: Reverse geocode coordinates to address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: coords
          in: query
          type: string
          description: Latitude and longitude as "lat,lng"
          required: true
        - name: region
          in: query
          type: string
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.TRIMBLE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: maps-geocoding-rest
    port: 8080
    description: REST adapter for Trimble Maps API — Geocoding. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/service-svc/geocode
      name: service-svc-geocode
      description: REST surface for Service.svc-geocode.
      operations:
      - method: GET
        name: geocodeaddress
        description: Geocode an address
        call: maps-geocoding.geocodeaddress
        with:
          addr: rest.addr
          region: rest.region
          outputFormat: rest.outputFormat
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/service-svc/reversegeocode
      name: service-svc-reversegeocode
      description: REST surface for Service.svc-reverseGeocode.
      operations:
      - method: GET
        name: reversegeocode
        description: Reverse geocode coordinates to address
        call: maps-geocoding.reversegeocode
        with:
          coords: rest.coords
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: maps-geocoding-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trimble Maps API — Geocoding. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: geocode-address
      description: Geocode an address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: maps-geocoding.geocodeaddress
      with:
        addr: tools.addr
        region: tools.region
        outputFormat: tools.outputFormat
      outputParameters:
      - type: object
        mapping: $.
    - name: reverse-geocode-coordinates-address
      description: Reverse geocode coordinates to address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: maps-geocoding.reversegeocode
      with:
        coords: tools.coords
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
