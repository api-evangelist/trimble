specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Trimble
providerId: trimble
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - Transportation
  - Geospatial
  - Rate Limiting
description: Trimble does not publish a unified public rate-limit page. Per-API limits live inside
  each Trimble product's authenticated developer documentation and are scoped to the customer's
  product license.
sources:
  - https://www.trimble.com/en/developer
notes: Public landing page does not document rate limits. Limits are per-product (Tekla, TMW,
  Trimble Connect, Viewpoint, etc.) and surfaced inside authenticated developer docs.
responseCodes:
  throttled: 429
limits:
  - name: Per-Product Limit
    scope: account/product
    metric: varies
    limit: see per-product authenticated developer docs
policies:
  - name: Per-Product Scoping
    description: Each Trimble product (Tekla, TMW, Trimble Connect, Viewpoint, Agriculture, etc.)
      enforces its own rate-limit policy scoped to the customer's license; consult the relevant
      product's developer documentation.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
