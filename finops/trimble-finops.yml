      - product
principles:
  - name: Visibility
    description: Each Trimble product (Tekla, TMW, Trimble Connect, Viewpoint, Agriculture) exposes
      its own usage console; finance reconciles against the per-product annual contract.
  - name: Allocation
    description: Allocate cost by Trimble product family and by the consuming project / fleet /
      site identifier already used inside each product.
  - name: Optimization
    description: Optimization is contractual — right-size seat counts and consolidate product
      modules at renewal across the construction / transportation / geospatial portfolio.
  - name: Accountability
    description: Per-product business owners (construction PM, fleet operations, GIS lead) co-own
      the Trimble contracts; procurement manages renewals.
