description: FinOps shape for Trimble cannot be reconciled from public sources; pricing is
  contact-sales / per-product license and per-API consumption telemetry sits inside each Trimble
  product's authenticated portal.
sources:
  - https://www.trimble.com/en/developer
  - https://marketplace.trimble.com
notes: Trimble does not publish a unified billing or usage telemetry surface across its product
  portfolio. FOCUS column values and meters can only be confirmed against the executed product
  license and the per-product portal.
